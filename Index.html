<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaviostudio | Creative & Tech Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
        }

        /* Header / Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 10%;
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
        }

        .logo span {
            color: #a855f7; /* Warna ungu neon */
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
        }

        nav a {
            color: #9ca3af;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #a855f7;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 80px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlow 3s infinite alternate;
        }

        .hero p {
            color: #9ca3af;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 35px;
            max-width: 600px;
        }

        /* Button */
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(168, 85, 247, 0.6);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.85rem;
            color: #4b5563;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background-color: #080c14;
        }

        footer a {
            color: #6366f1;
            text-decoration: none;
        }

        /* Animasi Efek */
        @keyframes textGlow {
            0% { filter: drop-shadow(0 0 2px rgba(168, 85, 247, 0.2)); }
            100% { filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.5)); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            .hero p {
                font-size: 1rem;
            }
            nav {
                display: none; /* Menyembunyikan menu di mobile untuk kesederhanaan */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ZAVIO<span>STUDIO</span></div>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero" id="home">
        <h1>We Build Digital Experiences</h1>
        <p>Tempat di mana ide kreatif dan eksekusi teknologi tanpa batas bertemu untuk menciptakan mahakarya digital yang luar biasa.</p>
        <a href="#" class="btn">Explore Our Work</a>
    </section>

    <footer>
        &copy; 2026 <a href="#">Zaviostudio</a>. All rights reserved. Deployed with pride.
    </footer>

</body>
</html>
